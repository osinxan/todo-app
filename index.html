<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои Задачи</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">✓</div>
    <div>
      <div class="header-title">Мои Задания</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary btn-sm" onclick="openSyncModal()">☁️ Синхронизация</button>
    <button class="btn btn-secondary btn-sm" onclick="openCategoriesModal()">🏷️ Категории</button>
    <button class="btn btn-secondary btn-sm" onclick="openTemplatesModal()">📋 Шаблоны</button>
    <button class="btn btn-danger btn-sm" onclick="openIncompleteModal()">⚠️ Долги</button>
    <button class="btn btn-secondary btn-sm" onclick="openServicesModule()">🧾 Услуги</button>
    <button class="btn btn-primary btn-sm" onclick="openAddTask()">+ Дело</button>
  </div>
</div>

<div class="container">
  <div class="filter-bar">
    <span style="font-size: 13px; color: var(--text2)">День:</span>
    <input type="date" id="filterDate" class="date-input-nav" onchange="filterTasks()">
    <button class="btn btn-secondary btn-sm" onclick="setFilterAll()">Все дни</button>
    <button class="btn btn-orange btn-sm" id="btnTransfer" onclick="openTransferModal()" style="margin-left: auto; display: none;">↷ Перенести дела</button>
  </div>
  <div id="mainCatFilter" class="cat-pills" style="display:none;"></div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-label">Всего дел</div>
    </div>
    <div class="stat-card" style="border-color: rgba(52,216,92,0.2)">
      <div class="stat-val" id="statDone" style="color: var(--green)">0</div>
      <div class="stat-label">Выполнено</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statLeft">0</div>
      <div class="stat-label">Осталось</div>
    </div>
  </div>

  <div id="taskList" class="task-list"></div>
  <div id="emptyState" class="empty-state" style="display:none"><p>На этот день задач нет 🗓️</p></div>
</div>

<!-- Все модальные окна и элементы интерфейса -->
<div class="modal-overlay" id="modalTask">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTaskTitle">Новое задание</div>
    <div class="form-group">
      <div class="form-label">Что нужно сделать?</div>
      <textarea class="form-input" id="taskName" placeholder="Например: Проверить приходы по 1С" rows="3"></textarea>
    </div>
    <div class="form-group">
      <div class="form-label">Дата</div>
      <input class="form-input" id="taskDate" type="date">
    </div>
    <div class="form-group">
      <div class="form-label">Категория</div>
      <select class="form-select" id="taskCategory"></select>
    </div>
    <button class="btn btn-secondary" style="width:100%; margin-bottom: 4px; font-size: 12px;" onclick="saveAsTemplate()">📋 Сохранить как шаблон</button>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modalTask')">Отмена</button>
      <button class="btn btn-primary" onclick="saveTask()">Сохранить</button>
    </div>
  </div>
</div>

<!-- (Все остальные модальные окна, услуги, долги и т.д. будут работать через JS) -->

<div class="toast" id="toast"></div>
<div id="syncIndicator" style="position:fixed; bottom:28px; right:20px; font-size:11px; color:var(--text3); opacity:0; transition:opacity 0.4s; pointer-events:none; z-index:999;"></div>

<script src="js/app.js"></script>
</body>
</html>
